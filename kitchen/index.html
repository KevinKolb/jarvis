<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#f4f1e6" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#14140f" media="(prefers-color-scheme: dark)">
  <title>Kitchen · JARVIS</title>
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/styles.css">
</head>
<body>
  <main class="page" data-room="kitchen">
    <a class="backlink" href="../">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m15 18-6-6 6-6"/></svg>
      Rooms
    </a>

    <!-- Kitchen header -->
    <header class="card kitchen-head">
      <span class="kitchen-conn"><span id="conn-text">connecting…</span></span>
      <h1 class="kitchen-title">Kitchen</h1>
      <div class="hero-lights">
        <span class="hero-lights-sq" id="lights-square"></span>
        <span id="lights-line-text">Lights off</span>
      </div>
    </header>

    <!-- Lights -->
    <section class="section theme-lights" aria-label="Lights">
      <div class="light-tools">
        <label class="tool-row" for="brightness">
          <span class="tool-label">Brightness <span id="bri-val">100%</span></span>
          <input type="range" id="brightness" class="slider" min="1" max="100" value="100" aria-label="Brightness">
        </label>
        <div class="tool-row">
          <span class="tool-label">Color</span>
          <div class="swatches" id="swatches" role="group" aria-label="Light color"></div>
        </div>
      </div>

      <button class="btn btn-toggle" id="lights-toggle" type="button" aria-label="Toggle kitchen lights">
        <svg class="icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 2v10"/><path d="M18.4 6.6a9 9 0 1 1-12.8 0"/></svg>
        <span class="toggle-txt">Toggle Lights</span>
      </button>
    </section>

    <!-- SiriusXM -->
    <section class="section theme-music" aria-labelledby="sxm-label">
      <p class="section-label" id="sxm-label">SiriusXM <span class="hint">· kitchen speakers</span></p>
      <div class="list" id="channel-list"></div>
    </section>

    <!-- Podcasts -->
    <section class="section theme-music" aria-labelledby="pod-label">
      <p class="section-label" id="pod-label">Podcasts</p>
      <div class="list" id="podcast-list"></div>
    </section>

    <!-- Now Playing -->
    <section class="section theme-music" aria-labelledby="np-label">
      <p class="section-label" id="np-label">Now Playing</p>
      <div class="card now-playing">
        <div class="np-body">
          <div class="np-kicker">Kitchen speakers</div>
          <div class="np-track" id="np-track">Nothing playing</div>
        </div>
        <div class="np-controls">
          <button class="np-btn" type="button" data-shortcut="Kitchen-Volume-Down" data-toast="Lowering the volume." aria-label="Volume down">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M11 5 6 9H2v6h4l5 4z"/><path d="M17 12h6"/></svg>
          </button>
          <button class="np-btn" type="button" data-shortcut="Kitchen-Volume-Up" data-toast="Raising the volume." aria-label="Volume up">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M11 5 6 9H2v6h4l5 4z"/><path d="M20 9v6M17 12h6"/></svg>
          </button>
          <button class="np-btn np-stop" type="button" data-shortcut="Kitchen-Stop" data-toast="Stopping playback in the kitchen." data-stop="true" aria-label="Stop">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><rect x="5" y="5" width="14" height="14" rx="2"/></svg>
            Stop
          </button>
        </div>
      </div>
    </section>

    <!-- QR to this page -->
    <section class="card qr" aria-label="Kitchen page QR code">
      <div class="qr-frame">
        <img class="qr-code" src="../assets/kitchen-qr.svg" width="88" height="88" alt="QR code that opens this kitchen page">
      </div>
      <div class="qr-body">
        <div class="qr-title">Scan or print this QR code to control the kitchen</div>
        <span class="qr-url">192.168.86.147/kitchen</span>
        <button class="chip qr-print" type="button" data-print="true">
          <svg class="icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 9V2h12v7"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8" rx="1"/></svg>
          Print QR code
        </button>
      </div>
    </section>
  </main>

  <!-- Print-only sheet: SCAN TO CONTROL KITCHEN + QR + url -->
  <div class="print-sheet" aria-hidden="true">
    <div class="print-card">
      <h1 class="print-heading">SCAN TO CONTROL KITCHEN</h1>
      <img class="print-qr" src="../assets/kitchen-qr.svg" alt="QR code for the kitchen page">
      <p class="print-url">192.168.86.147/kitchen</p>
    </div>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>
  <script src="../assets/app.js"></script>
</body>
</html>
