<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#f4f1e6" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#14140f" media="(prefers-color-scheme: dark)">
  <title>Kitchen · JARVIS</title>
  <link rel="icon" href="/kitchen.ico" sizes="any">
  <link rel="apple-touch-icon" href="/kitchen-touch.png">
  <meta name="apple-mobile-web-app-title" content="Kitchen">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/styles.css">
</head>
<body>
  <main class="page" data-room="kitchen">
    <!-- Kitchen header -->
    <header class="card kitchen-head" id="kitchen-hero">
      <div class="hero-status"><span id="lights-line-text">Off</span></div>
      <h1 class="kitchen-title"><svg class="kitchen-title-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M8 2v7a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V2"/><path d="M5 2v20"/><path d="M17 2c-1.7 0-3 2-3 5s1.3 5 3 5v10"/></svg>Kitchen</h1>
      <div class="hero-np" id="np-line">—</div>
    </header>

    <!-- Lights -->
    <section class="section theme-lights" aria-label="Lights">
      <div class="light-tools">
        <div class="tool-row">
          <span class="tool-label">Brightness <span id="bri-val">100%</span></span>
          <div class="bri-row">
            <button class="bri-end bri-off" id="bri-0" type="button" aria-label="Off (0%)">0%</button>
            <input type="range" id="brightness" class="slider" min="1" max="99" value="99" aria-label="Brightness">
            <button class="bri-end" id="bri-100" type="button" aria-label="Brightest (100%)">100%</button>
          </div>
        </div>
        <div class="tool-row">
          <span class="tool-label">Color</span>
          <div class="swatches" id="swatches" role="group" aria-label="Light color"></div>
        </div>

        <button class="btn btn-toggle" id="lights-toggle" type="button" aria-label="Toggle kitchen lights">
          <span class="toggle-txt">Engage</span>
        </button>
      </div>
    </section>

    <!-- Sound (Sonos) — one box -->
    <section class="section theme-music" aria-label="Sound">
      <div class="light-tools">
        <div class="tool-row">
          <span class="tool-label">Volume <span id="vol-val">—</span></span>
          <div class="bri-row">
            <button class="bri-end bri-off" id="vol-mute" type="button" aria-label="Mute toggle">Mute</button>
            <input type="range" id="volume" class="slider vol-slider" min="1" max="99" value="24" aria-label="Volume">
            <button class="bri-end vol-max" id="vol-100" type="button" aria-label="Max (100%)">100%</button>
          </div>
        </div>
        <div class="tool-row">
          <span class="tool-label">Share</span>
          <div class="chan-row" id="row-share"></div>
        </div>
        <div class="tool-row">
          <span class="tool-label">Radio</span>
          <div class="chan-row" id="row-radio"></div>
        </div>
        <div class="tool-row">
          <span class="tool-label">Artists</span>
          <div class="chan-row" id="row-artists"></div>
        </div>
        <div class="tool-row">
          <span class="tool-label">Jukebox</span>
          <div class="chan-row" id="row-jukebox"></div>
        </div>
        <div class="tool-row">
          <span class="tool-label">Albums</span>
          <div class="chan-row" id="row-albums"></div>
        </div>
        <div class="tool-row">
          <span class="tool-label">Playlists</span>
          <div class="chan-row" id="row-playlists"></div>
        </div>
        <div class="tool-row">
          <span class="tool-label">Podcasts</span>
          <div class="chan-row" id="row-podcasts"></div>
        </div>
      </div>
    </section>

    <!-- QR to this page -->
    <section class="card qr" aria-label="Kitchen page QR code">
      <div class="qr-frame">
        <img class="qr-code" src="../assets/kitchen-qr.svg" width="88" height="88" alt="QR code that opens this kitchen page">
      </div>
      <div class="qr-body">
        <div class="qr-title">Scan or print this QR code to control the kitchen</div>
        <div class="qr-or">or visit</div>
        <span class="qr-url">192.168.86.147/kitchen</span>
        <div class="qr-wifi">must be on wifi (SpamNet)</div>
        <button class="chip qr-print" type="button" data-print="true">
          <svg class="icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 9V2h12v7"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8" rx="1"/></svg>
          Print QR code
        </button>
      </div>
    </section>

    <footer class="page-footer">
      <a class="backlink" href="../">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m15 18-6-6 6-6"/></svg>
        Rooms
      </a>
      <a class="backlink" href="/admin.html">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        Admin
      </a>
      <div class="conn-status"><span class="conn-dot" id="conn-dot"></span><span id="conn-text">connecting…</span></div>
    </footer>
  </main>

  <!-- Print-only sheet: SCAN TO CONTROL KITCHEN + QR + url -->
  <div class="print-sheet" aria-hidden="true">
    <div class="print-card">
      <h1 class="print-heading">SCAN TO CONTROL KITCHEN</h1>
      <img class="print-qr" src="../assets/kitchen-qr.svg" alt="QR code for the kitchen page">
      <p class="print-url">192.168.86.147/kitchen</p>
    </div>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>
  <script src="../assets/app.js"></script>
</body>
</html>
