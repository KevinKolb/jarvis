<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#f4f1e6" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#14140f" media="(prefers-color-scheme: dark)">
  <title>Bathroom · JARVIS</title>
  <link rel="icon" href="/bathroom.ico" sizes="any">
  <meta name="apple-mobile-web-app-title" content="Bathroom">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/styles.css">
</head>
<body>
  <main class="page" data-room="bathroom" data-sonos-room="bathroom"
        data-hue-bridge="bedroom" data-lights-group="88" data-lights-members="22,24,20,21,34,35">
    <!-- Room nav -->
    <nav class="room-nav" aria-label="Rooms">
      <a class="room-nav-home" href="/" aria-label="All rooms"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m3 10.5 9-7.5 9 7.5"/><path d="M5 9.5V20a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V9.5"/></svg></a>
      <a href="/kitchen/"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M8 2v7a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V2"/><path d="M5 2v20"/><path d="M17 2c-1.7 0-3 2-3 5s1.3 5 3 5v10"/></svg>Kitchen</a>
      <a href="/bed/"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M2 20v-8a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v8"/><path d="M2 16h20"/><path d="M6 10V7a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v3"/><path d="M12 10V7a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v3"/></svg>Bedroom</a>
      <a href="/bathroom/" aria-current="page"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 12V6a2 2 0 0 1 3.5-1.3L9 6"/><path d="M2 12h20v2a5 5 0 0 1-5 5H7a5 5 0 0 1-5-5z"/><path d="M6 19l-1 2M18 19l1 2"/></svg>Bathroom</a>
    </nav>

    <!-- Bathroom header -->
    <header class="kitchen-head" id="bathroom-hero">
      <h1 class="kitchen-title"><svg class="kitchen-title-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 12V6a2 2 0 0 1 3.5-1.3L9 6"/><path d="M2 12h20v2a5 5 0 0 1-5 5H7a5 5 0 0 1-5-5z"/><path d="M6 19l-1 2M18 19l1 2"/></svg>Bathroom</h1>
    </header>

    <!-- Lights -->
    <section class="section theme-lights" aria-label="Lights">
      <div class="light-tools">
        <div class="lights-line"><span id="lights-line-text">Off</span></div>
        <div class="tool-row">
          <span class="tool-label">Brightness</span>
          <div class="bri-row">
            <button class="bri-end bri-off" id="bri-0" type="button" aria-label="Off (0%)">0%</button>
            <input type="range" id="brightness" class="slider" min="1" max="99" value="99" aria-label="Brightness">
            <button class="bri-end" id="bri-100" type="button" aria-label="Brightest (100%)">100%</button>
          </div>
        </div>
        <div class="tool-row">
          <span class="tool-label">Color</span>
          <div class="swatches" id="swatches" role="group" aria-label="Light color"></div>
        </div>

        <button class="btn btn-toggle" id="lights-toggle" type="button" aria-label="Toggle bathroom lights">
          <span class="toggle-txt">Engage</span>
        </button>

        <button class="btn btn-house-off" id="house-off" type="button" aria-label="Turn off all lights on this hub"></button>

        <button class="btn btn-house-off btn-house-off-all" id="house-off-all" type="button" aria-label="Turn off every light in the house">HOUSE OFF</button>
      </div>
    </section>

    <!-- Sound (Sonos) — now-playing + controls in one box -->
    <section class="section theme-music" aria-label="Sound">
      <div class="light-tools">
        <div class="np-status">
          <div class="np-primary" id="np-track">—</div>
          <div class="np-secondary" id="np-sub"></div>
        </div>
        <div class="np-art-wrap">
          <img class="np-art" id="np-art" alt="Album art" hidden>
          <div class="np-art np-art-loading" id="np-art-loading"><span id="np-art-msg">Loading art…</span></div>
          <div class="np-playbar">
            <button class="np-skip np-prev" id="np-prev" type="button" aria-label="Previous track" hidden>
              <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M6 6h2v12H6z"/><path d="M20 6v12L9 12z"/></svg>
            </button>
            <button class="np-playpause" id="np-playpause" type="button" aria-label="Play or pause">
              <svg class="pp-ico pp-pause" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><rect x="6" y="5" width="4" height="14" rx="1"/><rect x="14" y="5" width="4" height="14" rx="1"/></svg>
              <svg class="pp-ico pp-play" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M8 5v14l11-7z"/></svg>
            </button>
            <button class="np-skip np-next" id="np-next" type="button" aria-label="Next track" hidden>
              <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M4 6v12l11-6z"/><path d="M16 6h2v12h-2z"/></svg>
            </button>
          </div>
        </div>
        <div class="tool-row">
          <span class="tool-label">Volume</span>
          <div class="bri-row">
            <button class="bri-end bri-off" id="vol-mute" type="button" aria-label="Mute toggle">Mute</button>
            <input type="range" id="volume" class="slider vol-slider" min="1" max="99" value="24" aria-label="Volume">
            <button class="bri-end vol-max" id="vol-100" type="button" aria-label="Max (100%)">100%</button>
          </div>
        </div>
        <div class="tool-row">
          <span class="tool-label">Play In</span>
          <div class="chan-row" id="row-share"></div>
        </div>
        <div class="tool-row">
          <span class="tool-label">Radio</span>
          <div class="chan-row" id="row-radio"></div>
        </div>
        <div class="tool-row">
          <span class="tool-label">Artists</span>
          <div class="chan-row" id="row-artists"></div>
        </div>
        <div class="tool-row">
          <span class="tool-label">Jukebox</span>
          <div class="chan-row" id="row-jukebox"></div>
        </div>
        <div class="tool-row">
          <span class="tool-label">Albums</span>
          <div class="chan-row" id="row-albums"></div>
        </div>
        <div class="tool-row">
          <span class="tool-label">Playlists</span>
          <div class="chan-row" id="row-playlists"></div>
        </div>
        <div class="tool-row">
          <span class="tool-label">Podcasts</span>
          <div class="chan-row" id="row-podcasts"></div>
        </div>
      </div>
    </section>
  </main>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>
  <script src="../assets/app.js"></script>
</body>
</html>
